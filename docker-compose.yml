services:
  # ── PostgreSQL ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: agentscout_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentscout
      POSTGRES_PASSWORD: agentscout
      POSTGRES_DB: agentscout
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentscout"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend (FastAPI) ───────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: agentscout_backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db

  # ── Frontend (React → Nginx) ───────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: agentscout_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
