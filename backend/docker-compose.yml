version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: agentscout_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentscout
      POSTGRES_PASSWORD: agentscout
      POSTGRES_DB: agentscout
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentscout"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
